name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ── Job 1: Build Docker images and push to GitHub Container Registry ──
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push scraper image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/scraper:latest
            ghcr.io/${{ env.REPO }}/scraper:${{ github.sha }}

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/web:latest
            ghcr.io/${{ env.REPO }}/web:${{ github.sha }}

  # ── Job 2: Deploy to GCP instance ──
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/426118799666/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@project-7f2bcca1-e1a1-4074-978.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to GCP instance
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DIR=/opt/linkedin-job-tracker

          gcloud compute ssh instance-20260223-210400 \
            --zone=us-central1-a \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              # Create deploy directory if needed
              sudo mkdir -p ${DEPLOY_DIR}/data ${DEPLOY_DIR}/output &&
              sudo chmod -R 777 ${DEPLOY_DIR} &&
              cd ${DEPLOY_DIR} &&

              # Copy .env from user home if exists and not already here
              [ ! -f .env ] && [ -f /home/damodhardattareddylikki/linkedin-job-tracker/.env ] && cp /home/damodhardattareddylikki/linkedin-job-tracker/.env . ;

              # Copy base_resume.json if exists and not already here
              [ ! -f base_resume.json ] && [ -f /home/damodhardattareddylikki/linkedin-job-tracker/base_resume.json ] && cp /home/damodhardattareddylikki/linkedin-job-tracker/base_resume.json . ;

              # Copy existing data if exists and not already here
              [ ! -f data/jobs.db ] && [ -f /home/damodhardattareddylikki/linkedin-job-tracker/data/jobs.db ] && cp /home/damodhardattareddylikki/linkedin-job-tracker/data/jobs.db data/ ;

              # Pull latest docker-compose from GitHub
              curl -sL https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml -o docker-compose.prod.yml &&

              # Login to GitHub Container Registry
              echo ${DEPLOY_TOKEN} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin &&

              # Pull latest images
              sudo docker compose -f docker-compose.prod.yml pull &&

              # Stop old containers (from any location)
              sudo docker stop linkedin-job-tracker job-tracker-web 2>/dev/null || true &&
              sudo docker rm linkedin-job-tracker job-tracker-web 2>/dev/null || true &&

              # Start with new images
              sudo docker compose -f docker-compose.prod.yml up -d &&

              # Verify
              sudo docker ps &&
              echo 'Deployed successfully!'
            "
