name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ── Job 1: Build Docker images and push to GitHub Container Registry ──
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push scraper image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/scraper:latest
            ghcr.io/${{ env.REPO }}/scraper:${{ github.sha }}

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/web:latest
            ghcr.io/${{ env.REPO }}/web:${{ github.sha }}

  # ── Job 2: Deploy to GCP instance ──
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/426118799666/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@project-7f2bcca1-e1a1-4074-978.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to GCP instance
        run: |
          gcloud compute ssh instance-20260223-210400 \
            --zone=us-central1-a \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              cd ~/linkedin-job-tracker &&

              # Pull latest docker-compose from GitHub
              curl -sL https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml -o docker-compose.prod.yml &&

              # Login to GitHub Container Registry
              echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin &&

              # Pull latest images
              sudo docker compose -f docker-compose.prod.yml pull &&

              # Restart with new images
              sudo docker compose -f docker-compose.prod.yml down &&
              sudo docker compose -f docker-compose.prod.yml up -d &&

              # Verify
              sudo docker ps &&
              echo 'Deployed successfully!'
            "
