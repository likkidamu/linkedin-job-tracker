services:
  # ── Scraper: Pulls pre-built image from GitHub Container Registry ──
  job-tracker:
    image: ghcr.io/likkidamu/linkedin-job-tracker/scraper:latest
    container_name: linkedin-job-tracker
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./base_resume.json:/app/base_resume.json:ro
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - SCRAPE_INTERVAL_HOURS=${SCRAPE_INTERVAL_HOURS:-1}
      - JOB_KEYWORDS=${JOB_KEYWORDS:-software engineer,data engineer,backend,full stack}
      - JOB_LOCATION=${JOB_LOCATION:-United States}

  # ── Web Dashboard: Pulls pre-built image from GitHub Container Registry ──
  web:
    image: ghcr.io/likkidamu/linkedin-job-tracker/web:latest
    container_name: job-tracker-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output:ro
    environment:
      - DB_PATH=/app/data/jobs.db
      - OUTPUT_DIR=/app/output
